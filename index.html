const keys = {
    ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false,
    z: false, x: false, p: false, q: false, Shift: false
};

window.addEventListener('keydown', (e) => {
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        e.preventDefault();
    }
    let k = e.key;
    if (k === 'ArrowLeft') keys.ArrowLeft = true;
    if (k === 'ArrowRight') keys.ArrowRight = true;
    if (k === 'ArrowUp') keys.ArrowUp = true;
    if (k === 'ArrowDown') keys.ArrowDown = true;
    if (k.toLowerCase() === 'z') { keys.z = true; handleZPress(); }
    if (k.toLowerCase() === 'x') { keys.x = true; handleXPress(); }
    if (k.toLowerCase() === 'p') { keys.p = true; handlePPress(); }
    if (k.toLowerCase() === 'q') { keys.q = true; handleQPress(); }
    if (k === 'Shift') keys.Shift = true;
});

window.addEventListener('keyup', (e) => {
    let k = e.key;
    if (k === 'ArrowLeft') keys.ArrowLeft = false;
    if (k === 'ArrowRight') keys.ArrowRight = false;
    if (k === 'ArrowUp') keys.ArrowUp = false;
    if (k === 'ArrowDown') keys.ArrowDown = false;
    if (k.toLowerCase() === 'z') keys.z = false;
    if (k.toLowerCase() === 'x') keys.x = false;
    if (k.toLowerCase() === 'p') keys.p = false;
    if (k.toLowerCase() === 'q') keys.q = false;
    if (k === 'Shift') keys.Shift = false;
});

// --- 修改后的菜单控制与Z键逻辑 ---
function handleZPress() {
    if (gameState === 0) {
        if (menuDepth === 0) {
            isStagePractice = (modeSelection === 1);
            menuDepth = 1;
        } else if (menuDepth === 1) {
            if (isStagePractice) {
                menuDepth = 2; 
                stageSelection = 0; 
            } else {
                startGame(); triggerScene('start_level_1', 1);
            }
        } else if (menuDepth === 2) {
            let maxUnlocked = saveProgress.unlocked[menuSelection];
            if (stageSelection + 1 <= maxUnlocked) {
                startGame();
                let startCGs = ['start_level_1', 'end_level_1', 'end_level_2', 'end_level_3'];
                triggerScene(startCGs[stageSelection], 1);
            }
        }
    }
    else if (gameState === 4) { advanceDialogue(); }
    else if (gameState === 2 || gameState === 3) { gameState = 0; menuDepth = 0; }
}

function handleXPress() {
    if (gameState === 0 && menuDepth > 0) {
        menuDepth--; // 菜单返回
    }
    else if (gameState === 1 && !isPaused) {
        if (playerBomb > 0 && bombActiveTimer <= 0) {
            playerBomb--;
            bombActiveTimer = 60;
            deathBombTimer = 0; 
            invincibilityFrame = 60; 
        }
    }
}

function handlePPress() {
    if (gameState === 1) isPaused = !isPaused;
}

function handleQPress() {
    if (gameState === 1 && isPaused) {
        gameState = 0;
        menuDepth = 0;
        isPaused = false;
    }
}

window.addEventListener('keydown', (e) => {
    if (gameState === 0) {
        if (e.key === 'ArrowUp') {
            if (menuDepth === 0) modeSelection = (modeSelection > 0) ? 0 : 1;
            else if (menuDepth === 1) menuSelection = (menuSelection > 0) ? menuSelection - 1 : 3;
            else if (menuDepth === 2) stageSelection = (stageSelection > 0) ? stageSelection - 1 : 3;
        }
        if (e.key === 'ArrowDown') {
            if (menuDepth === 0) modeSelection = (modeSelection < 1) ? 1 : 0;
            else if (menuDepth === 1) menuSelection = (menuSelection < 3) ? menuSelection + 1 : 0;
            else if (menuDepth === 2) stageSelection = (stageSelection < 3) ? stageSelection + 1 : 0;
        }
    }
});

function rectIntersect(r1, r2) {
    return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
}

function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(''); 
    let line = '';
    for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n];
        const metrics = context.measureText(testLine);
        const testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x, y);
            line = words[n];
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x, y);
}

function triggerScene(sceneKey, nextState) {
    const scene = storyData[sceneKey];
    if (!scene) { gameState = nextState; return; }
    gameState = 4; 
    currentSceneRects = scene.CG; 
    currentDialogueLines = scene.text; 
    currentDialogueIndex = 0; 
    postSceneState = nextState; 
}

function advanceDialogue() {
    currentDialogueIndex++;
    if (currentDialogueIndex >= currentDialogueLines.length) {
        gameState = postSceneState;
    }
}

function darkenColor(cStr) {
    const map = {
        'magenta': '#8b008b', 'cyan': '#008b8b', 'orange': '#cc5500', 
        'pink': '#ff69b4', 'yellow': '#b8860b', 'red': '#8b0000',
        '#32b432': '#195a19', 'green': '#006400', '#b366ff': '#6600cc'
    };
    return map[cStr.toLowerCase()] || '#555';
}

function randomNextDouble() { return Math.random(); }
function randomNextInt(max) { return Math.floor(Math.random() * max); }
function randomNextBoolean() { return Math.random() < 0.5; }

// --- 类定义 ---

class Item {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.w = 20; this.h = 20;
    }
    update() { this.y += 2.5; }
    draw(ctx) {
        ctx.font = "bold 16px Arial";
        if (this.type === 0) {
            ctx.fillStyle = "rgb(0, 200, 0)";
            ctx.fillRect(this.x, this.y, 20, 20);
            ctx.fillStyle = "white";
            ctx.fillText("B", this.x + 5, this.y + 16);
        } else if (this.type === 1) {
            ctx.fillStyle = "pink";
            ctx.beginPath(); ctx.arc(this.x + 10, this.y + 10, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white";
            ctx.fillText("H", this.x + 5, this.y + 16);
        } else if (this.type === 2) {
            ctx.fillStyle = "#87CEFA"; 
            ctx.fillRect(this.x + 4, this.y + 4, 12, 12);
            ctx.strokeStyle = "white";
            ctx.strokeRect(this.x + 4, this.y + 4, 12, 12);
        }
    }
    getRect() { return {x: this.x, y: this.y, w: 20, h: 20}; }
}

class Bullet {
    constructor(x, y, w, h, dx, dy, color, isEnemy, behavior = null) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.dx = dx; this.dy = dy; this.color = color;
        this.isEnemyBullet = isEnemy;
        this.behavior = behavior;
        this.timer = 0;
        if (!isEnemy) this.type = 0;
        else {
            let c = color.toLowerCase();
            if (c==='magenta' || c==='cyan' || c==='orange' || c==='pink' || c==='#32b432' || c==='#b366ff') this.type = 1;
            else this.type = 2;
        }
    }
    update() { 
        this.timer++;
        if (this.behavior) {
            this.behavior(this);
        } else {
            this.x += this.dx; this.y += this.dy; 
        }
    }
    getRect() { return {x: this.x, y: this.y, w: this.w, h: this.h}; }
    draw(ctx) {
        if (this.type === 0) {
            let cx = this.x + this.w / 2;
            let cy = this.y + this.h / 2;
            
            if (this.behavior) {
                ctx.fillStyle = "rgba(0, 255, 204, 0.4)"; 
                ctx.beginPath();
                ctx.arc(cx, cy, this.w / 2 + 2, 0, Math.PI * 2); 
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(cx, cy, this.w / 2 - 1, 0, Math.PI * 2); 
                ctx.fill();
            } else {
                ctx.fillStyle = "rgba(255, 255, 0, 0.4)";
                ctx.beginPath();
                ctx.ellipse(cx, cy, this.w / 2 + 2, this.h / 2 + 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.ellipse(cx, cy, this.w / 2 - 1, this.h / 2 + 2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (this.type === 1) {
            let radius = this.w / 2.0;
            let grad = ctx.createRadialGradient(this.x + radius, this.y + radius, 0, this.x + radius, this.y + radius, radius);
            grad.addColorStop(0.0, 'white');
            grad.addColorStop(0.4, this.color);
            grad.addColorStop(1.0, darkenColor(this.color));
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(this.x + radius, this.y + radius, radius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.47)";
            ctx.stroke();
        } else {
            ctx.save();
            let angle = Math.atan2(this.dy, this.dx);
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(angle);
            let hw = this.w / 2 + 4, hh = this.h / 2;
            ctx.beginPath();
            ctx.moveTo(-hw, 0); ctx.lineTo(0, -hh); ctx.lineTo(hw, 0); ctx.lineTo(0, hh); ctx.closePath();
            ctx.fillStyle = "white"; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = this.color; ctx.stroke();
            ctx.restore();
        }
    }
}

class Enemy {
    constructor(x, y, w, h, hp, score) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.hp = hp; this.maxHp = hp; this.scoreValue = score;
        this.transitionTimer = 0; // 新增：状态切换计时器
    }
    get isInvincible() { return this.transitionTimer > 0; }
    draw(ctx) {}
    update() {}
    getRect() { return {x: this.x, y: this.y, w: this.w, h: this.h}; }
    checkHitPlayer(pRect) { return rectIntersect(this.getRect(), pRect); }
    fireSpread(bx, by, bdx, bdy, spreadX, spreadY, c) {
        let rx = (randomNextDouble() * 2 - 1) * spreadX;
        let ry = (randomNextDouble() * 2 - 1) * spreadY;
        bullets.push(new Bullet(bx, by, 8, 8, bdx + rx, bdy + ry, c, true));
    }
}

class FanAimEnemy extends Enemy {
    constructor(x, y) { super(x, y, 40, 40, 16, 500); this.timer = 0; }
    draw(ctx) {
        ctx.fillStyle = "#4B0082"; 
        ctx.beginPath();
        ctx.moveTo(this.x + 20, this.y + 40);
        ctx.lineTo(this.x, this.y);
        ctx.lineTo(this.x + 40, this.y);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#FF1493"; 
        ctx.beginPath(); ctx.arc(this.x + 20, this.y + 15, 6, 0, Math.PI*2); ctx.fill();
    }
    update() {
        this.y += 1.2 * diffMult; this.timer++;
        let rate = Math.max(30, Math.floor(70 / diffMult));
        if (this.timer % rate === 0) {
            let cx = this.x + 20, cy = this.y + 20;
            let aimAng = Math.atan2((playerY+20)-cy, (playerX+20)-cx);
            let aimSpd = 2.0 + diffMult*2; 
            bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(aimAng)*aimSpd, Math.sin(aimAng)*aimSpd, 'red', true));
            let count = (menuSelection === 0) ? 2 : 4 + menuSelection*2;
            let fanSpd = 1.0 + diffMult; 
            for(let i=0; i<count; i++) {
                let rAng = aimAng + (Math.random()*1.5 - 0.75);
                bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(rAng)*fanSpd, Math.sin(rAng)*fanSpd, 'pink', true));
            }
        }
    }
}

class SineCosineEnemy extends Enemy {
    constructor(x, y) { super(x, y, 40, 40, 16, 500); this.timer = 0; }
    draw(ctx) {
        ctx.fillStyle = "#2F4F4F";
        ctx.beginPath(); ctx.arc(this.x + 20, this.y + 20, 20, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#00FFFF"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(this.x + 20, this.y + 20, 12 + Math.sin(this.timer*0.2)*4, 0, Math.PI*2); ctx.stroke();
    }
    update() {
        this.y += 0.8 * diffMult; this.timer++;
        let rate = Math.max(40, Math.floor(90 / diffMult));
        if (this.timer % rate === 0) {
            let cx = this.x + 20, cy = this.y + 20;
            let ways = 4 + menuSelection * 3;
            let phaseOffset = this.timer * 0.05;
            let baseSpd = 1 + diffMult * 1; 
            let waveAmp = 0.2 + diffMult * 0.3; 
            for(let i=0; i<ways; i++) {
                let baseAng = i * (Math.PI*2 / ways) + phaseOffset;
                let isSine = (i % 2 === 0); 
                let spd = baseSpd + (isSine ? Math.sin(phaseOffset) : Math.cos(phaseOffset)) * waveAmp;

class BossSplitPart extends Enemy {
    constructor(x, y, dir) {
        super(x, y, 50, 50, 75, 400); this.initialDir = dir; this.timer = 0; this.spiralAngle = 0;
        this.anchorX = (dir < 0) ? (GAME_WIDTH / 2 - 100) : (GAME_WIDTH / 2 + 50); this.anchorY = 120;
    }
    draw(ctx) {
        let isStationary = ((Math.floor(this.timer/200))%2 === 0) ^ (this.initialDir > 0);
        let currentImg = isStationary ? boss2GuardAttackImg : boss2GuardImg;
        let cx = this.x + 30; let cy = this.y + 30;

        if (currentImg.complete) {
            let dw = 90; let dh = 90;
            let drawX = cx - dw / 2; let drawY = cy - dh / 2;
            ctx.save();
            if (this.initialDir < 0) {
                ctx.translate(cx, cy); ctx.scale(-1, 1);
                ctx.drawImage(currentImg, -dw / 2, -dh / 2, dw, dh);
            } else {
                ctx.drawImage(currentImg, drawX, drawY, dw, dh);
            }
            ctx.restore();
        } else {
            let coreColor = isStationary ? "rgb(255, 60, 0)" : "rgb(0, 180, 255)";
            let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
            grad.addColorStop(0, "white"); grad.addColorStop(1, coreColor);
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y-15, 60, 4);
        ctx.fillStyle = "green"; ctx.fillRect(this.x, this.y-15, 60*(this.hp/this.maxHp), 4);
    }
    update() {
        this.timer++; let s = diffMult, cx = this.x+30, cy = this.y+30;
        let isStationary = ((Math.floor(this.timer/200))%2 === 0) ^ (this.initialDir > 0);
        if (isStationary) {
            this.x += (this.anchorX - this.x)*0.04; this.y += (this.anchorY - this.y)*0.04;
            if (this.timer % Math.max(5, Math.floor(12/s)) === 0) {
                this.spiralAngle += 0.15 * s * Math.sign(this.initialDir);
                let ways = Math.max(8, Math.floor(12*s));
                for(let i=0; i<ways; i++) {
                    let ang = this.spiralAngle + i*(Math.PI*2/ways);
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(ang)*3, Math.sin(ang)*3, 'orange', true));
                }
            }
        } else {
            let px = playerX+20, py = playerY+20, dx = px-cx, dy = py-cy, dist = Math.sqrt(dx*dx+dy*dy);
            if (dist > 0) {
                let safeDist = 180, ix = px - (dx/dist)*safeDist - 30, iy = py - (dy/dist)*safeDist - 30;
                this.x += (ix - this.x)*0.03*s; this.y += (iy - this.y)*0.03*s;
            }
            if (this.timer % Math.max(25, Math.floor(50/s)) === 0) {
                let ang = Math.atan2(py-cy, px-cx);
                bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(ang)*5.5, Math.sin(ang)*5.5, 'cyan', true));
            }
        }
    }
}

class BossEnemy extends Enemy {
    constructor(x, y, level) {
        super(x, y, 160, 100, (level===1?320:380), 1000);
        this.level = level; this.targetX = GAME_WIDTH / 2 - 80; this.timer = 0; this.phase = 1;
        this.laserWarmup = 0; this.laserActive = 0; this.spiralAngle = 0;
        this.guards = []; this.isSplitTriggered = false;
        this.lockedLaserX = 0;
    }
    draw(ctx) {
        if (this.isSplitTriggered) return;
        if (this.level === 1 && boss1Img.complete) {
            let drawW = 220; let drawH = 220;
            let drawX = this.x + this.w / 2 - drawW / 2; let drawY = this.y + this.h / 2 - drawH / 2;
            ctx.drawImage(boss1Img, drawX, drawY, drawW, drawH);
        } 
        else if(this.level === 2 && boss2BodyImg.complete) {
            let dw = 200; let dh = 180;
            let drawX = this.x + (this.w / 2) - (dw / 2); let drawY = this.y + (this.h / 2) - (dh / 2);
            ctx.drawImage(boss2BodyImg, drawX, drawY, dw, dh);
        }
        else { this.drawOldSchool(ctx); }

        ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 25, 160, 8);
        ctx.fillStyle = "green"; ctx.fillRect(this.x, this.y - 25, 160 * (this.hp / this.maxHp), 8);
        ctx.strokeStyle = "white"; ctx.strokeRect(this.x, this.y - 25, 160, 8);

        if (this.laserWarmup > 0) {
            ctx.strokeStyle = "cyan";
            if (this.timer % 4 < 2) { 
                ctx.beginPath(); ctx.moveTo(this.lockedLaserX, this.y + 80); 
                ctx.lineTo(this.lockedLaserX, GAME_HEIGHT); ctx.stroke(); 
            }
        }
        if (this.laserActive > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.5)";
            ctx.fillRect(this.lockedLaserX - 35, this.y + 80, 70, GAME_HEIGHT);
        }
        
        if (this.isInvincible) {
            let cx = this.x + this.w / 2;
            let cy = this.y + this.h / 2;
            let radius = Math.max(this.w, this.h) / 2 + 10; 
            ctx.save();
            ctx.fillStyle = `rgba(0, 255, 255, ${Math.abs(Math.sin(this.timer * 0.1)) * 0.4})`;
            ctx.beginPath(); 
            ctx.arc(cx, cy, radius, 0, Math.PI * 2); 
            ctx.fill();
            ctx.strokeStyle = "rgba(0, 255, 255, 0.9)";
            ctx.lineWidth = 3; 
            ctx.stroke();
            ctx.restore();
        }
    }
    drawOldSchool(ctx) {
        let grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y+100);
        grad.addColorStop(0, "darkgray"); grad.addColorStop(1, "black");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.ellipse(this.x+80, this.y+50, 80, 30, 0, 0, Math.PI*2); ctx.fill();
    }
    update() {
        if (this.isSplitTriggered) return;
        if (this.y < 60) this.y += 2;
        else {
            if (Math.abs(this.x - this.targetX) < 10 || this.timer % 120 === 0) this.targetX = randomNextInt(GAME_WIDTH - 160);
            this.x += (this.targetX - this.x)*0.03;
        }
        this.timer++;
        let hpPercent = this.hp / this.maxHp, s = diffMult, cx = this.x+80, cy = this.y+50;
        let expectedPhase = (hpPercent>0.65) ? 1 : (hpPercent>0.3) ? 2 : 3;
        if (expectedPhase > this.phase && this.transitionTimer <= 0) {
            this.transitionTimer = 80; 
        }
        if (this.transitionTimer > 0) {
            this.transitionTimer--;
            if (this.transitionTimer === 0) this.phase = expectedPhase; 
            return; 
        }
        let diff = menuSelection, waves = diff + 1;
        
        if (this.phase === 1) {
            if (this.timer % Math.max(3, Math.floor(6/s)) === 0) {
                this.spiralAngle += 0.15*s; let spd = 3.5;
                for(let w=0; w<waves; w++) {
                    let offset = w * (Math.PI/waves);
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(this.spiralAngle+offset)*spd, Math.sin(this.spiralAngle+offset)*spd, 'magenta', true));
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(-this.spiralAngle+Math.PI+offset)*spd, Math.sin(-this.spiralAngle+Math.PI+offset)*spd, 'cyan', true));
                }
            }
            let aimRate = Math.floor(70/s);
            if (this.timer % aimRate < waves * 6 && this.timer % 6 === 0) {
                let ang = Math.atan2((playerY+20)-cy, (playerX+20)-cx);
                let spread = (diff===0) ? 1 : (diff===3) ? 5 : 3;
                let halfSpread = Math.floor(spread/2);
                for(let i = -halfSpread; i <= halfSpread; i++) {
                    bullets.push(new Bullet(cx, cy, 12, 12, Math.cos(ang+i*0.2)*5, Math.sin(ang+i*0.2)*5, 'yellow', true));
                }
            }
        }
        else if (this.phase === 2) {
            if (this.timer % 120 === 0) {
                this.laserWarmup = 40;
                this.lockedLaserX = this.x + 80;
            }
            let ringRate = Math.max(35, Math.floor(60/s));
            if (this.timer % ringRate < waves * 8 && this.timer % 8 === 0) {
                let count = 12 + diff * 6;
                let offset = (this.timer % 16 === 0) ? 0 : (Math.PI/count);
                for(let i=0; i<count; i++) {
                    let ang = offset + i*(Math.PI*2/count);
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(ang)*2.8, Math.sin(ang)*2.8, 'orange', true));
                }
            }
        }
        else if (this.phase === 3) {
            if (this.timer % 80 === 0 && this.laserWarmup===0 && this.laserActive===0) {
                this.laserWarmup = 25;
                this.lockedLaserX = this.x + 80;
            }
            if (this.timer % Math.max(1, 4-diff) === 0) {
                let rAng = Math.random()*Math.PI*2, rSpd = 1.5+Math.random()*3*s;
                bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(rAng)*rSpd, Math.sin(rAng)*rSpd, 'pink', true));
            }
            let burstRate = Math.floor(60/s);
            if (this.timer % burstRate < waves * 5 && this.timer % 5 === 0) {
                let bAng = Math.atan2((playerY+20)-cy, (playerX+20)-cx);
                let ways = 1 + diff*2, halfWays = Math.floor(ways/2);
                for(let i = -halfWays; i <= halfWays; i++) {
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(bAng+i*0.15)*4.5, Math.sin(bAng+i*0.15)*4.5, 'red', true));
                }
            }
        }
        
        if (this.level === 2 && this.guards.length === 0) {
            this.guards.push(new OrbitGuard(this, 0)); this.guards.push(new OrbitGuard(this, Math.PI));
        }
        for(let g of this.guards) g.update();
        
        if (this.laserWarmup > 0 && --this.laserWarmup === 0) this.laserActive = 30;
        if (this.laserActive > 0) this.laserActive--;
        
        if (this.level === 2 && hpPercent < 0.25 && !this.isSplitTriggered) {
            this.isSplitTriggered = true; this.hp = 0; 
            enemies.push(new BossSplitPart(this.x, this.y, 3));      
            enemies.push(new BossSplitPart(this.x + 80, this.y, -3)); 
        }
    }
    checkHitPlayer(pRect) {
        if (this.isSplitTriggered) return false;
        if (rectIntersect({x:this.x+20, y:this.y+20, w:120, h:60}, pRect)) return true;
        for(let g of this.guards) if (g.hp>0 && g.checkHitPlayer(pRect)) return true;
        if (this.laserActive > 0) {
            let lw = (this.level===2)?100:70;
            if (rectIntersect({x:this.lockedLaserX-lw/2, y:this.y+80, w:lw, h:GAME_HEIGHT}, pRect)) return true;
        }
        return false;
    }
}

        this.timer++;
        let hpPercent = this.hp/this.maxHp, s = diffMult;
        let expectedPhase = (hpPercent>0.75)?1 : (hpPercent>0.5)?2 : (hpPercent>0.25)?3 : 4;
        if (expectedPhase > this.phase && this.transitionTimer <= 0) {
            this.transitionTimer = 80; 
        }
        if (this.transitionTimer > 0) {
            this.transitionTimer--;
            if (this.transitionTimer === 0) this.phase = expectedPhase;
            return; 
        }
        let cx = this.x+130, cy = this.y+60, px = playerX+20, py = playerY+20;
        let diff = menuSelection, waves = 2*diff+1;
        
        let disguisedSnipeRate = Math.max(25, Math.floor(100/s));
        if (this.timer % disguisedSnipeRate === 0) {
            let baseAngle = Math.atan2(py-cy, px-cx), count = Math.floor(2+2*s);
            for(let i=0; i<count; i++) {
                let angleNoise = (Math.random()*0.8 - 0.4);
                let speed = 2.0*s + Math.random()*3.0;
                bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(baseAngle+angleNoise)*speed, Math.sin(baseAngle+angleNoise)*speed, '#32b432', true));
            }
        }

        let aoeRate = Math.max(20, Math.floor(70 / s)); 
        if (this.timer % aoeRate === 0) {
            let aoeBullets = 10 + diff * 6; 
            let timeFactor = this.timer * 0.03; 
            
            for (let i = 0; i < aoeBullets; i++) {
                let baseAngle = (i / aoeBullets) * Math.PI * 2;
                let waveModX = Math.sin(timeFactor + baseAngle * 3) * (1.5 * s); 
                let waveModY = Math.cos(timeFactor + baseAngle * 3) * (1.5 * s);
                let baseSpeed = 2 + diff * 0.5;
                let vx = Math.cos(baseAngle + timeFactor) * baseSpeed + waveModX;
                let vy = Math.sin(baseAngle + timeFactor) * baseSpeed + waveModY;
                bullets.push(new Bullet(cx, cy, 9, 9, vx, vy, '#b366ff', true)); 
            }
        }

        if (this.phase === 1) {
            let spiralRate = Math.max(3, Math.floor(8/s));
            if (this.timer % spiralRate === 0) {
                this.spiralAngle += 0.15*s; let arms = 2+diff;
                for(let w=0; w<arms; w++) {
                    let offset = w*(Math.PI/arms);
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(this.spiralAngle+offset)*2.5, Math.sin(this.spiralAngle+offset)*2.5, 'magenta', true));
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(-this.spiralAngle+Math.PI+offset)*2.5, Math.sin(-this.spiralAngle+Math.PI+offset)*2.5, 'cyan', true));
                }
            }
            if (this.timer % Math.floor(60/s) === 0) {
                let ways = 5 + diff * 3;
                for (let i = 0; i < ways; i++) {
                    let ang = Math.PI/2 - 0.4 + i * (0.8 / (ways-1)); 
                    bullets.push(new Bullet(cx, cy, 12, 12, Math.cos(ang)*4, Math.sin(ang)*4, 'yellow', true));
                }
            }
        }
        else if (this.phase === 2) {
            if (this.timer % 15 === 0) {
                for(let w=0; w<waves; w++) {
                    bullets.push(new Bullet(cx - 40*w, cy+40, 8, 8, Math.sin(this.timer*0.1)*3, 3.5*s, 'cyan', true));
                    bullets.push(new Bullet(cx + 40*w, cy+40, 8, 8, Math.cos(this.timer*0.1)*3, 3.5*s, 'cyan', true));
                }
            }
            let ringRate = Math.max(30, Math.floor(40/s));
            if (this.timer % ringRate < waves * 8 && this.timer % 8 === 0) {
                let count = 12 + diff*6;
                let offset = (this.timer%16===0)?0:(Math.PI/count);
                let baseAng = Math.atan2(py-cy, px-cx); 
                for(let i = 0; i < count; i++) {
                    let ang = baseAng + i * (Math.PI*2 / count);
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(ang)*3.5, Math.sin(ang)*3.5, 'orange', true));
                }
            }
        }
        else if (this.phase === 3) {
            if (!this.phase3Summoned) {
                enemies.push(new YamatoEnemy(this.x, this.y+130, true));        
                enemies.push(new YamatoEnemy(this.x+210, this.y+130, true));   
                this.phase3Summoned = true;
            }
            if (this.timer % 10 === 0) { 
                let rotSpeed = (Math.floor(this.timer/200)%2===0) ? 0.15 : -0.15;
                this.spiralAngle += rotSpeed * s;
                for(let w=0; w<waves; w++) {
                    let offset = w*(Math.PI/waves);
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(this.spiralAngle+offset)*3.5, Math.sin(this.spiralAngle+offset)*3.5, 'yellow', true));
                }
            }
            if (this.timer % Math.max(5, Math.floor(15/s)) === 0) {
                let count = 4 + 1.5*diff; 
                for(let j=0; j<count; j++) {
                    let rAng = Math.random()*Math.PI*2; 
                    let rSpd = 2.0 + Math.random()*2.5*s; 
                    bullets.push(new Bullet(cx, cy, 6, 6, Math.cos(rAng)*rSpd, Math.sin(rAng)*rSpd, 'pink', true));
                }
            }
            let aimRate = Math.floor(60/s); 
            if (this.timer % aimRate < waves * 6 && this.timer % 6 === 0) {
                let bAng = Math.atan2(py-cy, px-cx);
                let ways = 1+diff*2, halfWays = Math.floor(ways/2);
                for(let i=-halfWays; i<=halfWays; i++) {
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(bAng+i*0.2)*4.5, Math.sin(bAng+i*0.2)*4.5, 'red', true));
                }
            }
        }
        else if (this.phase === 4) {
            if (this.timer % Math.max(25, 60 - diff * 10) === 0) {
                enemies.push(new MeteorEnemy(10 + Math.random() * 50, -40)); 
                enemies.push(new MeteorEnemy(GAME_WIDTH - 100 + Math.random() * 50, -40)); 
            }
            if (this.timer % Math.max(4, Math.floor(12 / s)) === 0) {
                this.spiralAngle += 0.12 * s; 
                let ways = 4 + diff * 2;
                for (let i = 0; i < ways; i++) {
                    let offset = i * (Math.PI * 2 / ways);
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(this.spiralAngle + offset) * 3.5, Math.sin(this.spiralAngle + offset) * 3.5, 'orange', true));
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(-this.spiralAngle + offset) * 3.5, Math.sin(-this.spiralAngle + offset) * 3.5, 'cyan', true));
                }
            }
            let finalRate = Math.max(40, Math.floor(80 / s)); 
            if (this.timer % finalRate < waves * 3 && this.timer % 3 === 0) {
                let ang = Math.atan2(py - cy, px - cx);
                let ways = 3 + diff * 2, halfWays = Math.floor(ways / 2);
                for (let i = -halfWays; i <= halfWays; i++) {
                    bullets.push(new Bullet(cx, cy, 12, 12, Math.cos(ang + i * 0.08) * 5.5, Math.sin(ang + i * 0.08) * 5.5, 'red', true));
                }
            }
        }
    }
    checkHitPlayer(pRect) {
        if (super.checkHitPlayer(pRect)) return true;
        if (this.phase === 1 && this.laserActive > 0) {
            let lx = 20 + this.laserStep * 40, rx = GAME_WIDTH - 20 - this.laserStep * 40;
            if (rectIntersect({x:lx-10, y:this.y+60, w:20, h:GAME_HEIGHT}, pRect)) return true;
            if (rectIntersect({x:rx-10, y:this.y+60, w:20, h:GAME_HEIGHT}, pRect)) return true;
        }
        return false;
    }
}

class Level4Boss extends Enemy {
    constructor(x, y) {
        super(x, y, 220, 160, 1140, 25000); 
        this.timer = 0; 
        this.phase = 1; 
        this.aimOffset = 0; 
        this.rowAngle = 0;  
    }
    
   draw(ctx) {
        if (boss4Img.complete) {
            let drawW = 260; 
            let drawH = 190;
            let drawX = this.x + this.w / 2 - drawW / 2; 
            let drawY = this.y + this.h / 2 - drawH / 2;
            ctx.drawImage(boss4Img, drawX, drawY, drawW, drawH);
        } else {
            let cx = this.x + this.w/2, cy = this.y + this.h/2;
            let grad = ctx.createRadialGradient(cx, cy, 20, cx, cy, 80);
            grad.addColorStop(0, "white");
            grad.addColorStop(0.5, "rgb(255, 0, 50)");
            grad.addColorStop(1, "rgba(50, 0, 10, 0.8)");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y-20, this.w, 10);
        ctx.fillStyle = "green"; ctx.fillRect(this.x, this.y-20, this.w*(this.hp/this.maxHp), 10);
        ctx.strokeStyle = "white"; ctx.strokeRect(this.x, this.y-20, this.w, 10);

        if (this.isInvincible) {
            let cx = this.x + this.w / 2;
            let cy = this.y + this.h / 2;
            let radius = Math.max(this.w, this.h) / 2 + 10; 
            
            ctx.save();
            ctx.fillStyle = `rgba(0, 255, 255, ${Math.abs(Math.sin(this.timer * 0.1)) * 0.4})`;
            ctx.beginPath(); 
            ctx.arc(cx, cy, radius, 0, Math.PI * 2); 
            ctx.fill();
            
            ctx.strokeStyle = "rgba(0, 255, 255, 0.9)";
            ctx.lineWidth = 3; 
            ctx.stroke();
            ctx.restore();
        }
    }
    
    update() {
        if (this.y < 30) { this.y += 1; return; } 
        this.timer++;
        
        let hpPercent = this.hp / this.maxHp;
        let expectedPhase = (hpPercent>0.75) ? 1 : (hpPercent>0.5) ? 2 : (hpPercent>0.25) ? 3 : 4;
        if (expectedPhase > this.phase && this.transitionTimer <= 0) {
            this.transitionTimer = 80; 
            bullets = bullets.filter(b => !b.isEnemyBullet);
        }
        if (this.transitionTimer > 0) {
            this.transitionTimer--;
            if (this.transitionTimer === 0) this.phase = expectedPhase;
            return; 
        }
        
        let cx = this.x + 100, cy = this.y + 75;
        let px = playerX + 17.5, py = playerY + 17.5; 
        let diff = menuSelection; 

        if (this.phase === 1) {
            if (this.timer % Math.max(2,(12-5*diff)) === 0) {
                let snakeWave = Math.sin(this.timer * 0.06) * (90+20*diff); 
                bullets.push(new Bullet(cx - 100 + snakeWave, cy, 10, 10, 0, 4.5, 'magenta', true)); 
                bullets.push(new Bullet(cx + 100 + snakeWave, cy, 10, 10, 0, 4.5, 'magenta', true)); 
            }

            let randomStreams = 1 + diff * 2; 
            if (this.timer % 20 === 0) {
                for(let i = 0; i < randomStreams; i++) {
                    let rAng = Math.random() * Math.PI * 2;
                    let rSpd = 1.5 + Math.random() * (1 + diff); 
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(rAng)*rSpd, Math.sin(rAng)*rSpd, 'pink', true));
                }
            }

            let aimSpeed = 3.5 + diff * 0.8; 
            if (this.timer % (24/(diff+1)) === 0) {
                this.aimOffset += 0.08; 
                let bAng = Math.atan2(py - cy, px - cx) + Math.sin(this.aimOffset) * 0.15; 
                bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(bAng)*aimSpeed, Math.sin(bAng)*aimSpeed, 'red', true));
            }
            
            let aimBurstCount = 1 + diff * 2; 
            if (this.timer % 40 === 0) {
                let burstAng = Math.atan2(py - cy, px - cx);
                for(let i = 0; i < aimBurstCount; i++) {
                    let spread = (i - Math.floor(aimBurstCount/2)) * 0.12;
                    bullets.push(new Bullet(cx, cy, 12, 12, Math.cos(burstAng+spread)*aimSpeed, Math.sin(burstAng+spread)*aimSpeed, 'orange', true));
                }
            }

            let rowDensity = 3 + diff ;  
            let rowWaves = 1; 
            let rowCycle = 120;             
            
            if (this.timer % rowCycle < (rowWaves * 10) && this.timer % 10 === 0) {
                let targetAngle = Math.atan2(py - cy, px - cx);
                this.rowAngle = Math.sin(this.timer * 0.02) * 0.4; 
                let fallAng = targetAngle + this.rowAngle; 
                let spacing = 26 - diff * 6; 
                
                for(let i = 0; i < rowDensity; i++) {
                    let offset = (i - Math.floor(rowDensity/2)) * spacing; 
                    let spawnX = cx + Math.cos(fallAng + Math.PI/2) * offset;
                    let spawnY = cy + Math.sin(fallAng + Math.PI/2) * offset;
                    bullets.push(new Bullet(spawnX, spawnY, 8, 8, Math.cos(fallAng)*3.5, Math.sin(fallAng)*3.5, 'cyan', true));
                }
            }
        }
        else if (this.phase === 2) {
            if (this.timer % (20-diff*4) === 0) {
                let randomStreams = 1 + diff * 2; 
                for(let i=0; i<randomStreams; i++) {
                    let rAng = Math.random() * Math.PI * 2;
                    bullets.push(new Bullet(cx, cy, 6, 6, Math.cos(rAng)*2.5, Math.sin(rAng)*2.5, 'pink', true));
                }
            }
            if (this.timer % (8-diff) === 0) {
                let aimAng = Math.atan2(py - cy, px - cx) + (Math.random()*0.1 - 0.05);
                bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(aimAng)*(3.5+diff*0.8), Math.sin(aimAng)*(3.5+diff*0.8), 'red', true));
            }

            let arcRate = Math.max(25, 55 - diff*10); 
            if (this.timer % arcRate === 0) {
                let targetAng = Math.atan2(py - cy, px - cx); 
                let bulletCount = 20 + diff * 20; 
                let arcSpread = Math.PI * 1.3;   
                let startAng = targetAng - arcSpread / 2;
                let step = arcSpread / bulletCount;
                
                for (let i = 0; i <= bulletCount; i++) {
                    if (diff <= 1) {
                        if (i % (3 + diff*2) === 0) continue; 
                    }
                    let ang = startAng + i * step;
                    bullets.push(new Bullet(cx, cy, 10, 10, Math.cos(ang)*3.2, Math.sin(ang)*3.2, 'yellow', true));
                }
            }
        }
        else if (this.phase === 3) {
            if (this.timer % 15 === 0) {
                let randomStreams = 2 + diff * 2; 
                for(let i=0; i<randomStreams; i++) {
                    let rAng = Math.random() * Math.PI * 2;
                    bullets.push(new Bullet(cx, cy, 8, 8, Math.cos(rAng)*2.5, Math.sin(rAng)*2.5, 'pink', true));
                }
            }

            let cycle = this.timer % 240; 
            let spawnPhase = Math.floor(cycle / 60); 
            
            if (this.timer % 3 === 0) { 
                let sx = 0, sy = 0;
                let progress = (cycle % 60) / 60; 
                
                if (spawnPhase === 0) { sx = progress * GAME_WIDTH; sy = 180; }                
                else if (spawnPhase === 1) { sx = GAME_WIDTH - progress * GAME_WIDTH; sy = 400; }     
                else if (spawnPhase === 2) { sx = 100; sy = progress * 800; }            
                else if (spawnPhase === 3) { sx = GAME_WIDTH - 100; sy = 800 - progress * 800; }      
                
                let scatter = 10 + diff * 5; 
                let density = 1 + diff*2;       
                
                for(let i = 0; i < density; i++) {
                    let noiseX = (Math.random() - 0.5) * scatter;
                    let noiseY = (Math.random() - 0.5) * scatter;

                    let b = new Bullet(sx + noiseX, sy + noiseY, 8, 8, 0, 0, 'cyan', true);
                    
                    b.behavior = function(bul) {
                        if (bul.timer === 80) { 
                            let rAng = Math.random() * Math.PI * 2;
                            let rSpd = 1.0 + Math.random() * (1 + diff * 0.5); 
                            bul.dx = Math.cos(rAng) * rSpd;
                            bul.dy = Math.sin(rAng) * rSpd;
                            bul.color = 'orange'; 
                            bul.behavior = null;  
                        }
                    };
                    bullets.push(b);
                }
            }
        }
        else if (this.phase === 4) {
            let isFirstHalf = (this.timer % 400) < 200;
            let corners = isFirstHalf ? 
                [{x: 40, y: GAME_HEIGHT - 40}, {x: GAME_WIDTH - 40, y: 40}] :  
                [{x: GAME_WIDTH - 40, y: GAME_HEIGHT - 40}, {x: 40, y: 40}];   
                
            let snakeStreams = 1 + diff; 
            let snakeRate = Math.max(3, 24 - diff * 4); 
            let snakeSpeed = 1.5 + diff * 0.4; 
            let waveAmp = 1.0 + diff * 0.4; 

            if (this.timer % snakeRate === 0) { 
                for (let c of corners) {
                    for (let i = 0; i < snakeStreams; i++) {
                        let driftX = Math.sin(this.timer * 0.05 + i) * 40;
                        let driftY = Math.cos(this.timer * 0.05 + i) * 40;
                        let spawnX = c.x + driftX;
                        let spawnY = c.y + driftY;
                        
                        let aimAng = Math.atan2(py - spawnY, px - spawnX);
                        
                        let b = new Bullet(spawnX, spawnY, 12, 12, Math.cos(aimAng)*snakeSpeed, Math.sin(aimAng)*snakeSpeed, 'red', true);
                        
                        b.behavior = function(bul) {
                            let perpX = -Math.sin(aimAng); 
                            let perpY = Math.cos(aimAng);
                            let wave = Math.cos(bul.timer * 0.15) * waveAmp; 
                            
                            bul.x += bul.dx + perpX * wave;
                            bul.y += bul.dy + perpY * wave;
                        };
                        bullets.push(b);
                    }
                }
            }
            let snipeRate = Math.max(10, 50 - diff * 5); 
            if (this.timer % snipeRate === 0) {
                let bAng = Math.atan2(py - cy, px - cx);
                let snipeCount = 1 + diff * 2; 
                let snipeSpeed = 3.5 + diff * 1.0; 
                
                for(let i = 0; i < snipeCount; i++) {
                    let spread = (i - Math.floor(snipeCount/2)) * 0.15;
                    bullets.push(new Bullet(cx, cy, 14, 14, Math.cos(bAng+spread)*snipeSpeed, Math.sin(bAng+spread)*snipeSpeed, '#32b432', true));
                }
            }
        }
    }
}

// --- 游戏主逻辑 ---

function startGame() {
    diffMult = (menuSelection===0)?1.0 : (menuSelection===1)?1.5 : (menuSelection===2)?1.8 : 2.2;
    currentDiffMult = diffMult;
    maxPlayerHP = (menuSelection===0)?8 : (menuSelection===1)?6 : 5;
    playerHP = maxPlayerHP;
    playerBomb = 2; bombActiveTimer = 0;
    playerX = GAME_WIDTH / 2 - 20; playerY = 600;
    score = 0; timerCount = 0;
    levelTimer = 0; 
    reward8k = false; reward20k = false; 
    invincibilityFrame = 0; bossSpawned = false; isPaused = false;
    bullets = []; enemies = []; items = [];
    
    // 选关模式下处理对应的起始关卡
    if (isStagePractice) {
        currentLevel = stageSelection + 1;
    } else {
        currentLevel = 1;
    }
    
    gameState = 1;
}

function takeDamage() {
    if (invincibilityFrame <= 0 && bombActiveTimer <= 0 && deathBombTimer <= 0) {
        deathBombTimer = 16; 
    }
}

function checkHighScore() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('planeGameHighScore', highScore);
    }
}

function update() {
    if (gameState !== 1 || isPaused) return;
    
    timerCount++;
    levelTimer++;

    if (deathBombTimer > 0) {
        deathBombTimer--;
        if (deathBombTimer === 0) {
            playerHP--;
            if(playerHP == 1){playerBomb++;}
            invincibilityFrame = 60;
            if (playerHP <= 0) gameState = 2;
            checkHighScore(); 
        }
    }
    if (invincibilityFrame > 0) invincibilityFrame--;
    
    if (bombActiveTimer > 0) {
        bombActiveTimer--;
        bullets = bullets.filter(b => !b.isEnemyBullet);
    }
    
    let speed = keys.Shift ? 3 : 7;
    // 更新边界：玩家不能超出新设定的 GAME_WIDTH
    if (keys.ArrowLeft && playerX > 0) playerX -= speed;
    if (keys.ArrowRight && playerX < GAME_WIDTH - 40) playerX += speed; 
    if (keys.ArrowUp && playerY > 0) playerY -= speed;
    if (keys.ArrowDown && playerY < 760) playerY += speed;
    
    if (keys.z && timerCount % 6 === 0) {
        if (currentLevel >= 4) {
            bullets.push(new Bullet(playerX + 5, playerY, 8, 12, 0, -12, 'yellow', false));
            bullets.push(new Bullet(playerX + 25, playerY, 8, 12, 0, -12, 'yellow', false));
        } else {
            bullets.push(new Bullet(playerX + 15, playerY, 8, 12, 0, -12, 'yellow', false));
        }
    }
    if (keys.z && timerCount % 18 === 0) {
        let homingCount = (currentLevel >= 4) ? 4 : 2;
        let spacing = (homingCount === 4) ? 30 : 50; 
        
        for (let i = 0; i < homingCount; i++) {
            let offsetX = (i - (homingCount - 1) / 2) * spacing; 
            let spawnX = playerX + 15 + offsetX;
            let spawnY = playerY + 25; 
            
            let target = null;
            let minDist = Infinity;
            for (let e of enemies) {
                if (e.y < -50 || e.hp <= 0 || e instanceof OrbitGuard) continue; 
                let dx = (e.x + e.w/2) - spawnX;
                let dy = (e.y + e.h/2) - spawnY;
                let dist = dx*dx + dy*dy;
                if (dist < minDist) { minDist = dist; target = e; }
            }
            
            let speed = 22;
            let vx = 0;
            let vy = -speed; 
            
            if (target) {
                let angle = Math.atan2((target.y + target.h/2) - spawnY, (target.x + target.w/2) - spawnX);
                vx = Math.cos(angle) * speed;
                vy = Math.sin(angle) * speed;
            }
            
            let b = new Bullet(spawnX, spawnY, 8, 16, vx, vy, '#00FFCC', false);
            b.behavior = function(bul) {
                bul.x += bul.dx; 
                bul.y += bul.dy;
            };
            
            bullets.push(b);
        }
    }
    
    if (!bossSpawned) {
        if (currentLevel === 1 && levelTimer >= 1200) { enemies.push(new BossEnemy(GAME_WIDTH/2 - 80, -100, 1)); bossSpawned = true; }
        else if (currentLevel === 2 && levelTimer >= 1800) { enemies.push(new BossEnemy(GAME_WIDTH/2 - 80, -100, 2)); bossSpawned = true; }
        else if (currentLevel === 3 && levelTimer >= 2400) { enemies.push(new StarshipBoss(GAME_WIDTH/2 - 130, -150)); bossSpawned = true; }
        else if (currentLevel === 4 && levelTimer >= 3200) { enemies.push(new Level4Boss(GAME_WIDTH/2 - 110, -150)); bossSpawned = true; }
        else {
            let spawnRate = Math.max(27, Math.floor(45/(1+0.4*diffMult)));
            if (currentLevel === 4) spawnRate = 45;
            
            if (timerCount % spawnRate === 0) {
                let rx = randomNextInt(GAME_WIDTH - 60);
                if (currentLevel === 1) {
                    enemies.push(randomNextBoolean() ? new NormalEnemy(rx, -30) : new ShooterEnemy(rx, -40));
                } else if (currentLevel === 2) {
                    enemies.push((randomNextInt(10)<3) ? new NormalEnemy(rx, -30) : new EliteShooter(rx, -40));
                } else if (currentLevel === 3) {
                    let r = randomNextInt(100);
                    if (r < 25) enemies.push(new MeteorEnemy(rx, -40));
                    else if (r < 45) enemies.push(new YamatoEnemy(rx, -50, false));
                    else if (r < 65) enemies.push(new EliteShooter(rx, -40));
                    else {
                        let swarmCount = (menuSelection===0)?8 : (menuSelection===1)?12 : (menuSelection===2)?16 : 24;
                        for(let i=0; i<swarmCount; i++) enemies.push(new SwarmMinion(rx+(i%4)*25-35, -40-Math.floor(i/4)*25));
                    }
                } else if (currentLevel === 4) {
                    let r = randomNextInt(100);
                    if (r < 50) enemies.push(new FanAimEnemy(rx, -40));
                    else  enemies.push(new SineCosineEnemy(rx, -40));
                }
            }
        }
    }
    
    bullets.forEach(b => b.update());
    let hitBox = {x: playerX+16, y: playerY+16, w: 3, h: 3};
    let itemHitBox = {x: playerX - 40, y: playerY - 40, w: 120, h: 120};
    
    for(let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.update();
        if (rectIntersect(item.getRect(), itemHitBox)) { 
            if (item.type === 0) playerBomb++;
            else if (item.type === 1) {
                if (playerHP < maxPlayerHP) playerHP++;
                else score += 1000;
            } 
            else if (item.type === 2) {
                score += 100; 
            }
            items.splice(i, 1);
        }
    }
    
    let triggerLevel2 = false, triggerLevel3 = false, triggerLevel4 = false, triggerWin = false;
    
    for(let i = enemies.length - 1; i >= 0; i--) {
        let en = enemies[i];
        en.update();
        if (en.checkHitPlayer(hitBox)) takeDamage();

        if (bombActiveTimer > 0 && timerCount % 5 === 0) {
            if (!en.isInvincible) en.hp -= 1; // 增加无敌判断
        }

        let isDead = (en.hp <= 0); 
        
        for(let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if (!b.isEnemyBullet && rectIntersect(b.getRect(), en.getRect())) {
                if (!en.isInvincible)en.hp--;
                bullets.splice(j, 1);
                if (en.hp <= 0) {
                    isDead = true; 
                }
                break; 
            }
        }
        
        if (isDead) {
            score += en.scoreValue;
            let isBoss = (en instanceof BossEnemy || en instanceof StarshipBoss || en instanceof BossSplitPart || en instanceof Level4Boss);
            if (!isBoss) {
                items.push(new Item(en.x + en.w/2, en.y + en.h/2, 2)); 
                if (!bossSpawned) {
                    if (currentLevel === 1) levelTimer += 20; 
                    else if (currentLevel === 2) levelTimer += 40; 
                    else if (currentLevel === 3) levelTimer += 48; 
                    else if (currentLevel === 4) levelTimer += 80; 
                }
            }
            
            // --- 修改这里的 Boss 死亡判定，加入选关退出逻辑与进度保存 ---
            if (en instanceof BossEnemy && currentLevel === 1) {
                saveUnlock(2);
                if (isStagePractice) {
                    triggerScene('end_level_1', 0); menuDepth = 0;
                    enemies.splice(i, 1);
                } else {
                    triggerLevel2 = true; items.push(new Item(en.x+80, en.y+50, 0));
                }
            } else if (en instanceof BossSplitPart) {
                let splitsLeft = enemies.filter(e => e instanceof BossSplitPart).length;
                if (splitsLeft <= 1) { 
                    saveUnlock(3);
                    if (isStagePractice) {
                        triggerScene('end_level_2', 0); menuDepth = 0;
                        enemies.splice(i, 1);
                    } else {
                        triggerLevel3 = true; items.push(new Item(en.x+30, en.y+30, 1)); 
                    }
                }
            } else if (en instanceof StarshipBoss) {
                saveUnlock(4);
                if (isStagePractice) {
                    triggerScene('end_level_3', 0); menuDepth = 0;
                    enemies.splice(i, 1);
                } else {
                    triggerLevel4 = true; 
                }
            } else if (en instanceof Level4Boss) {
                triggerWin = true; 
            }
            if (!isStagePractice || !(en instanceof BossEnemy || en instanceof BossSplitPart || en instanceof StarshipBoss || en instanceof Level4Boss)) {
                enemies.splice(i, 1);
            }
        }
    }
    
    if (triggerLevel2) { 
        triggerScene('end_level_1', 1); 
        currentLevel = 2; bossSpawned = false; bullets = []; enemies = []; levelTimer = 0;
    }
    if (triggerLevel3) { 
        triggerScene('end_level_2', 1);
        currentLevel=3; bossSpawned=false; bullets=[]; enemies=[]; score=Math.max(score,5000); levelTimer = 0;
    }
    if (triggerLevel4) {
        triggerScene('end_level_3', 1);
        currentLevel=4; bossSpawned=false; bullets=[]; enemies=[]; score=Math.max(score,10000); levelTimer = 0;
    }
    if (triggerWin) { 
        let baseMult = 1.0;
        if (menuSelection === 0) baseMult = 1.0;      
        else if (menuSelection === 1) baseMult = 1.5; 
        else if (menuSelection === 2) baseMult = 1.8; 
        else if (menuSelection === 3) baseMult = 2.4; 

        let hpMult = playerHP * 0.05;     
        let bombMult = playerBomb * 0.1;  

        let totalMult = baseMult + hpMult + bombMult;
        
        score = Math.floor(score * totalMult);
        const endingScenes = ['end_level_4_easy', 'end_level_4_normal', 'end_level_4_hard', 'end_level_4_lunatic'];
        
        // 胜利时，如果是选关模式，播放完对应CG回到主页(gameState 0)
        if (isStagePractice) {
            triggerScene(endingScenes[menuSelection], 0);
            menuDepth = 0;
        } else {
            triggerScene(endingScenes[menuSelection], 3); 
        }

        currentDialogueLines = [...currentDialogueLines, `【系统】：战斗结算完毕，最终得分：${score} `];
        checkHighScore();
    }
    
    if (!reward8k && score >= 12000) {
        reward8k = true;
        items.push(new Item(GAME_WIDTH/2 - 40, -20, 0)); 
        items.push(new Item(GAME_WIDTH/2 + 40, -20, 1)); 
    }
    if (!reward20k && score >= 28000) {
        reward20k = true;
        items.push(new Item(GAME_WIDTH/2 - 40, -20, 0)); 
        items.push(new Item(GAME_WIDTH/2 + 40, -20, 1)); 
    }
    for(let b of bullets) {
        if (b.isEnemyBullet && rectIntersect(b.getRect(), hitBox)) takeDamage();
    }
    
    // 更新边界：清理超过 GAME_WIDTH 范围太远的子弹
    bullets = bullets.filter(b => !(b.y<-50 || b.y>850 || b.x<-50 || b.x>GAME_WIDTH+50));
    items = items.filter(item => item.y <= 850);
}

function draw() {
    // 每次清空整个画布
    ctx.clearRect(0, 0, TOTAL_WIDTH, GAME_HEIGHT);

    // 1. 绘制游戏主区域背景
    ctx.fillStyle = "rgb(15, 15, 35)";
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    // ----------------------------------------------------
    // 主菜单状态 (包含选关多层菜单)
    // ----------------------------------------------------
    if (gameState === 0) {
        ctx.fillStyle = "rgb(10, 10, 20)";
        ctx.fillRect(0, 0, TOTAL_WIDTH, GAME_HEIGHT);
        
        // 绘制标题
        ctx.textAlign = "center";
        ctx.fillStyle = "#00FFFF"; 
        ctx.font = "bold 56px 'Microsoft YaHei', sans-serif"; 
        ctx.shadowColor = "cyan";
        ctx.shadowBlur = 15;
        ctx.fillText("幻想战姬传", TOTAL_WIDTH / 2, 200);
        
        ctx.fillStyle = "#FF00FF";
        ctx.font = "bold 26px 'Microsoft YaHei', sans-serif"; 
        ctx.shadowColor = "#FF00FF";
        ctx.fillText("~ the adventure of suger ~", TOTAL_WIDTH / 2, 260);
        ctx.shadowBlur = 0; // 重置阴影以免影响其他文字
        
        ctx.font = "24px 'Microsoft YaHei', sans-serif";
        
        // --- 深度 0：选择游玩模式 ---
        if (menuDepth === 0) {
            let modes = ["故事模式 (Story Mode)", "选关模式 (Stage Practice)"];
            for (let i = 0; i < 2; i++) {
                let y = 380 + i * 65;
                if (i === modeSelection) {
                    ctx.fillStyle = "rgba(0, 255, 255, 0.2)";
                    ctx.fillRect(TOTAL_WIDTH/2 - 200, y - 35, 400, 50);
                    ctx.fillStyle = "yellow";
                    ctx.fillText("▶ " + modes[i] + " ◀", TOTAL_WIDTH / 2, y);
                } else {
                    ctx.fillStyle = "white";
                    ctx.fillText(modes[i], TOTAL_WIDTH / 2, y);
                }
            }
        } 
        // --- 深度 1：选择难度 ---
        else if (menuDepth === 1) {
            ctx.fillStyle = "#FFCC00";
            ctx.fillText("请选择难度等级", TOTAL_WIDTH/2, 330);
            for (let i = 0; i < 4; i++) {
                let y = 390 + i * 65;
                if (i === menuSelection) {
                    ctx.fillStyle = "rgba(0, 255, 255, 0.2)";
                    ctx.fillRect(TOTAL_WIDTH/2 - 200, y - 35, 400, 50);
                    ctx.fillStyle = "yellow";
                    ctx.fillText("▶ " + diffNames[i] + " ◀", TOTAL_WIDTH / 2, y);
                } else {
                    ctx.fillStyle = "white";
                    ctx.fillText(diffNames[i], TOTAL_WIDTH / 2, y);
                }
            }
        } 
        // --- 深度 2：选择关卡 ---
        else if (menuDepth === 2) {
            ctx.fillStyle = "#FFCC00";
            ctx.fillText("请选择挑战关卡", TOTAL_WIDTH/2, 330);
            let maxUnlocked = saveProgress.unlocked[menuSelection];
            for (let i = 0; i < 4; i++) {
                let y = 390 + i * 65;
                let isLocked = (i + 1) > maxUnlocked;
                let text = "STAGE " + (i + 1) + (isLocked ? " [未解锁]" : "");
                
                if (i === stageSelection) {
                    ctx.fillStyle = isLocked ? "rgba(255, 0, 0, 0.2)" : "rgba(0, 255, 255, 0.2)";
                    ctx.fillRect(TOTAL_WIDTH/2 - 200, y - 35, 400, 50);
                    ctx.fillStyle = isLocked ? "gray" : "yellow";
                    ctx.fillText("▶ " + text + " ◀", TOTAL_WIDTH / 2, y);
                } else {
                    ctx.fillStyle = isLocked ? "#555" : "white";
                    ctx.fillText(text, TOTAL_WIDTH / 2, y);
                }
            }
        }
        
        // 操作说明
        ctx.fillStyle = "gray"; ctx.font = "16px sans-serif";
        if (menuDepth === 0) {
            ctx.fillText("按上下方向键选择模式，按 Z 键确认", TOTAL_WIDTH / 2, 650);
        } else {
            ctx.fillText("按上下键选择，Z 键确认，X 键返回上级", TOTAL_WIDTH / 2, 650);
        }
        ctx.fillText("战斗操作：方向键移动 | Z 射击 | X Bomb | Shift 低速 | P 暂停", TOTAL_WIDTH / 2, 680);
        
        ctx.textAlign = "left"; // 恢复对齐
        ctx.font = "14px Arial"; ctx.fillStyle = "rgb(150, 150, 150)";
        ctx.fillText("v1.0.5 - Extra Wide Edition (+选关功能)", 10, 780);
        ctx.fillText("Author: Bingtangsoft", TOTAL_WIDTH - 150, 780);
        return;
    }
    
    if (gameState === 2) {
        ctx.fillStyle = "red"; ctx.font = "bold 40px sans-serif"; ctx.fillText("GAME OVER", GAME_WIDTH/2 - 110, 350);
        ctx.fillStyle = "white"; ctx.font = "20px sans-serif"; ctx.fillText("按 Z 键返回主菜单", GAME_WIDTH/2 - 80, 420);
        return;
    }
    if (gameState === 3) {
        ctx.fillStyle = "green"; ctx.font = "bold 40px sans-serif"; ctx.fillText("MISSION CLEAR!", GAME_WIDTH/2 - 140, 350);
        ctx.fillStyle = "white"; ctx.font = "20px sans-serif"; ctx.fillText("按 Z 键返回主菜单", GAME_WIDTH/2 - 80, 420);
        return;
    }
    if (gameState === 4) {
        ctx.fillStyle = "#000"; 
        ctx.fillRect(0, 0, GAME_WIDTH, 400); 
        if (currentSceneRects) {
            currentSceneRects.forEach(r => {
                const rx = r.x || (GAME_WIDTH - r.w) / 2; // 居中适配GAME_WIDTH
                const ry = r.y || 0;
                if (r.img) {
                    ctx.drawImage(r.img, rx, ry, r.w, r.h);
                } else {
                    ctx.fillStyle = r.c;
                    ctx.fillRect(rx, ry, r.w, r.h);
                }
            });
        }
        
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; 
        ctx.strokeStyle = "rgb(100, 100, 255)"; 
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.rect(10, 410, GAME_WIDTH - 20, 380); 
        ctx.fill();
        ctx.stroke();
        
        if (currentDialogueLines[currentDialogueIndex]) {
            ctx.fillStyle = "white";
            ctx.font = "20px '黑体', 'SansSerif', sans-serif";
            const text = currentDialogueLines[currentDialogueIndex];
            wrapText(ctx, text, 30, 450, GAME_WIDTH - 60, 30);
        }
        
        if (timerCount % 30 < 15) { 
            ctx.fillStyle = "gray";
            ctx.font = "16px sans-serif";
            ctx.fillText("按 Z 键继续...", GAME_WIDTH - 120, 770);
        }
        return;
    }

    if (bombActiveTimer > 0) {
        ctx.fillStyle = "rgba(0, 255, 255, 0.47)";
        let radius = (60 - bombActiveTimer) * 15;
        ctx.beginPath(); ctx.arc(playerX+20, playerY+20, radius, 0, Math.PI*2); ctx.fill();
    }
    
    if (invincibilityFrame % 4 < 2 || bombActiveTimer > 0) {
        if (deathBombTimer > 0) {
            let cx = playerX + 17.5; let cy = playerY + 17.5;
            let dw = 80; let dh = 80;
            ctx.fillStyle = (timerCount % 2 === 0) ? "rgba(255,0,0,0.8)" : "rgba(255,255,255,0.8)";
            ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI*2); ctx.fill();
            ctx.drawImage(playerImg, cx - dw/2, cy - dh/2, dw, dh);
        }
        let cx = playerX + 17.5; let cy = playerY + 17.5;
        let dw = 80; let dh = 80; 
        ctx.drawImage(playerImg, cx - dw/2, cy - dh/2, dw, dh);

        ctx.fillStyle = "rgba(0, 255, 255, 0.8)";
        ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(cx, cy, 1.5, 0, Math.PI * 2); ctx.fill();

        if (timerCount % 4 < 2) {
            ctx.fillStyle = "#FFCC00";
            ctx.beginPath(); ctx.moveTo(cx - 5, cy + 25); ctx.lineTo(cx + 5, cy + 25); ctx.lineTo(cx, cy + 35); ctx.fill();
        }
    }

    for(let item of items) item.draw(ctx);
    for(let b of bullets) b.draw(ctx);
    for(let en of enemies) {
        en.draw(ctx);
        if (en instanceof BossEnemy) for(let og of en.guards) og.draw(ctx);
    }
    
    if (bossSpawned) {
        for(let e of enemies) {
            if (e instanceof BossEnemy || e instanceof StarshipBoss || e instanceof BossSplitPart || e instanceof Level4Boss) {
                let bx = Math.max(15, Math.min(GAME_WIDTH - 15, e.x + e.w/2));
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.moveTo(bx, 770); ctx.lineTo(bx-12, 790); ctx.lineTo(bx+12, 790); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "red";
                ctx.beginPath(); ctx.moveTo(bx, 775); ctx.lineTo(bx-6, 788); ctx.lineTo(bx+6, 788); ctx.closePath(); ctx.fill();
            }
        }
    }

    if (isPaused) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)"; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.fillStyle = "white"; ctx.font = "bold 40px sans-serif"; ctx.fillText("PAUSED", GAME_WIDTH/2 - 80, 380);
        ctx.font = "20px sans-serif"; 
        ctx.fillText("按 P 键恢复游戏", GAME_WIDTH/2 - 75, 430);
        ctx.fillStyle = "#FF5555";
        ctx.fillText("按 Q 键退出回主菜单", GAME_WIDTH/2 - 95, 470);
    }

    // ----------------------------------------------------
    // 侧边栏绘制 (Sidebar UI)
    // ----------------------------------------------------
    let sbX = GAME_WIDTH;
    
    // 侧边栏背景与边框
    ctx.fillStyle = "#181824";
    ctx.fillRect(sbX, 0, SIDEBAR_WIDTH, GAME_HEIGHT);
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sbX, 0); ctx.lineTo(sbX, GAME_HEIGHT);
    ctx.stroke();

    // 标题区域
    ctx.fillStyle = "white"; 
    ctx.font = "bold 18px 'Microsoft YaHei'";
    ctx.fillText("幻想战姬传", sbX + 25, 40);
    ctx.fillStyle = "#00FFFF";
    ctx.font = "italic 14px Arial";
    ctx.fillText("开发版本不代表最终品质", sbX + 20, 60);

    // 分割线
    ctx.strokeStyle = "#333";
    ctx.beginPath(); ctx.moveTo(sbX + 10, 85); ctx.lineTo(sbX + SIDEBAR_WIDTH - 10, 85); ctx.stroke();

    // 关卡与难度
    ctx.fillStyle = "white"; ctx.font = "16px Arial";
    ctx.fillText("STAGE:", sbX + 15, 120);
    ctx.fillStyle = "#FFCC00"; ctx.font = "bold 22px Arial";
    ctx.fillText(currentLevel, sbX + 80, 122);

    ctx.fillStyle = "white"; ctx.font = "14px 'Microsoft YaHei'";
    let diffDisplayName = diffNames[menuSelection].split('(')[0];
    ctx.fillText("难度: " + diffDisplayName, sbX + 15, 150);
    ctx.fillStyle = isStagePractice ? "#00FFCC" : "white";
    ctx.fillText(isStagePractice ? "[选关模式]" : "[故事模式]", sbX + 15, 170);

    // 分割线
    ctx.beginPath(); ctx.moveTo(sbX + 10, 190); ctx.lineTo(sbX + SIDEBAR_WIDTH - 10, 190); ctx.stroke();

    // 分数区域
    ctx.fillStyle = "gold"; ctx.font = "14px Arial";
    ctx.fillText("HI-SCORE", sbX + 15, 220);
    ctx.font = "bold 18px Arial";
    ctx.fillText(Math.max(score, highScore).toLocaleString(), sbX + 15, 245);

    ctx.fillStyle = "white"; ctx.font = "14px Arial";
    ctx.fillText("SCORE", sbX + 15, 280);
    ctx.font = "bold 18px Arial";
    ctx.fillText(score.toLocaleString(), sbX + 15, 305);

    // 分割线
    ctx.beginPath(); ctx.moveTo(sbX + 10, 330); ctx.lineTo(sbX + SIDEBAR_WIDTH - 10, 330); ctx.stroke();

    // HP 血条
    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; 
    ctx.fillText("HP", sbX + 15, 365);
    ctx.fillStyle = "darkgray"; ctx.fillRect(sbX + 15, 380, 160, 18);
    ctx.fillStyle = "red"; ctx.fillRect(sbX + 15, 380, 160 * (playerHP/maxPlayerHP), 18);
    ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.strokeRect(sbX + 15, 380, 160, 18);
    // 在血条中间显示数字
    ctx.fillStyle = "white"; ctx.font = "14px Arial";
    ctx.fillText(playerHP + " / " + maxPlayerHP, sbX + 70, 394);
    
    // Bomb
    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
    ctx.fillText("BOMB", sbX + 15, 435);
    ctx.fillStyle = "green";
    for(let i=0; i<playerBomb; i++) {
        ctx.beginPath(); ctx.arc(sbX + 25 + i * 22, 460, 8, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
    }
}

const FPS = 40;
const frameInterval = 1000 / FPS; 
let lastTime = performance.now();
let accumulator = 0;

function gameLoop(currentTime) {
    requestAnimationFrame(gameLoop);
    let deltaTime = currentTime - lastTime;
    lastTime = currentTime;
    if (deltaTime > 250) deltaTime = 250;
    accumulator += deltaTime;
    while (accumulator >= frameInterval) {
        update();
        accumulator -= frameInterval;
    }
    draw();
}

requestAnimationFrame(gameLoop);

</script>
</body>
